<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DISAGRO - Checklist de Mantenimientos</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #f5f5f5; }
    .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
    .header { background: #2e7d32; color: white; padding: 25px; border-radius: 8px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
    .header h1 { margin: 0; font-size: 28px; }
    .header-info { display: flex; gap: 30px; align-items: center; }
    .btn-salir { width: 80px; padding: 8px; background: #d32f2f; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
    .btn-salir:hover { background: #b71c1c; }
    .badge { background: #fff; color: #2e7d32; padding: 4px 12px; border-radius: 20px; font-weight: bold; font-size: 12px; }
    .tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 2px solid #ddd; overflow-x: auto; }
    .tab-btn { padding: 12px 20px; background: transparent; border: none; cursor: pointer; font-weight: bold; color: #666; border-bottom: 3px solid transparent; white-space: nowrap; }
    .tab-btn.active { color: #2e7d32; border-bottom-color: #2e7d32; }
    .tab { display: none; }
    .tab.active { display: block; }
    .section { background: white; padding: 25px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 20px; }
    .section h2 { color: #2e7d32; margin-bottom: 20px; }
    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; margin-bottom: 25px; }
    .stat { background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%); padding: 25px; border-radius: 8px; text-align: center; border-left: 4px solid #2e7d32; }
    .stat-num { font-size: 40px; font-weight: bold; color: #2e7d32; }
    .stat-label { color: #666; font-size: 14px; margin-top: 8px; }
    table { width: 100%; border-collapse: collapse; }
    th { background: #2e7d32; color: white; padding: 15px; text-align: left; }
    td { padding: 15px; border-bottom: 1px solid #eee; }
    tr:hover { background: #f9f9f9; }
    .form-group { margin-bottom: 15px; }
    label { display: block; font-weight: bold; color: #333; margin-bottom: 5px; }
    input, select, textarea { width: 100%; padding: 10px; border: 2px solid #ddd; border-radius: 4px; font-size: 14px; }
    input:focus, select:focus, textarea:focus { outline: none; border-color: #2e7d32; }
    button { padding: 12px 25px; background: #2e7d32; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
    button:hover { background: #1b5e20; }
    #loginView { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #f5f5f5; }
    .login-box { background: white; padding: 40px; border-radius: 8px; box-shadow: 0 2px 16px rgba(0,0,0,0.1); max-width: 450px; width: 100%; }
    .login-box h1 { color: #2e7d32; text-align: center; margin-bottom: 10px; font-size: 32px; }
    .login-box h3 { text-align: center; color: #666; margin-bottom: 30px; }
    .creds { background: #f0f0f0; padding: 15px; border-radius: 4px; max-height: 250px; overflow-y: auto; font-size: 12px; margin-top: 20px; }
    .cred-item { padding: 8px; border-bottom: 1px solid #ddd; }
    .item-box { background: #f9f9f9; padding: 15px; border-radius: 6px; margin-bottom: 15px; border-left: 4px solid #2e7d32; }
    .checkbox-label { display: flex; gap: 10px; align-items: center; cursor: pointer; margin-bottom: 10px; }
    .checkbox-label input { width: 20px; height: 20px; margin: 0; }
    .filters { background: #f9f9f9; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
    .loading { text-align: center; color: #999; padding: 20px; }
  </style>
</head>
<body>

<div id="loginView">
  <div class="login-box">
    <img id="logoLogin" alt="DISAGRO" style="display:block;margin:0 auto 15px;max-width:200px;">
    <h3>Checklist de Mantenimientos</h3>
    
    <div class="form-group">
      <label>Tu nombre:</label>
      <input type="text" id="usuario" autocomplete="off" list="listaUsuarios">
      <datalist id="listaUsuarios"></datalist>
    </div>

    <div class="form-group">
      <label>Tu contraseña:</label>
      <input type="password" id="password" autocomplete="off">
    </div>
    
    <button onclick="app.login()" style="width: 100%;">INGRESAR</button>
  </div>
</div>

<div id="appView" style="display: none;">
  <div class="header">
    <div style="display:flex;align-items:center;gap:15px;">
      <img id="logoHeader" alt="DISAGRO" style="height:46px;border-radius:4px;">
      <div>
        <h1>Checklist de Mantenimientos</h1>
        <p style="margin-top: 5px;">Tienda: <strong id="tiendaDisplay">-</strong> <span id="rolBadge"></span></p>
      </div>
    </div>
    <div class="header-info">
      <p>👤 <strong id="userDisplay">-</strong></p>
      <button class="btn-salir" onclick="app.logout();">SALIR</button>
    </div>
  </div>

  <div class="container">
    <div class="tabs">
      <button class="tab-btn active" onclick="app.showTab('dashboard', event)">📊 Dashboard</button>
      <button class="tab-btn" onclick="app.showTab('auditoria', event)">➕ Nueva Auditoría</button>
      <button class="tab-btn" onclick="app.showTab('reportes', event)">📋 Reportes</button>
    </div>

    <div id="dashboard" class="tab active">
      <div class="section">
        <h2>Estadísticas</h2>
        <div class="stats" id="stats">
          <div class="stat"><div class="stat-num">-</div><div class="stat-label">Total</div></div>
          <div class="stat"><div class="stat-num">-%</div><div class="stat-label">Promedio</div></div>
          <div class="stat"><div class="stat-num">-</div><div class="stat-label">Tiendas</div></div>
        </div>
        <div class="filters" id="filtersDiv"></div>
        <div style="overflow-x: auto;">
          <table>
            <thead>
              <tr id="tableHeader">
                <th>Checklist</th>
                <th>Fecha</th>
                <th>%</th>
              </tr>
            </thead>
            <tbody id="dashTable">
              <tr><td colspan="4" class="loading">⏳ Cargando auditorías...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <div id="auditoria" class="tab">
      <div class="section">
        <h2>Nueva Auditoría</h2>
        <div class="form-group">
          <label>Checklist:</label>
          <select id="selectChecklist" onchange="app.cargarChecklist()">
            <option value="">-- Selecciona --</option>
            <option value="Mantenimiento Generador">Mantenimiento Generador</option>
            <option value="Bitácora Generador Diaria">Bitácora Generador Diaria</option>
            <option value="Mantenimiento Portapalets">Mantenimiento Portapalets</option>
            <option value="Mantenimiento Tarimas">Mantenimiento Tarimas</option>
            <option value="Ducha Emergencia">Ducha Emergencia</option>
            <option value="Aires Acondicionados">Aires Acondicionados</option>
            <option value="Bitácora Montacargas">Bitácora Montacargas</option>
            <option value="Verificación Montacargas">Verificación Montacargas</option>
            <option value="Inspección Señalización">Inspección Señalización</option>
          </select>
        </div>
        <div class="form-group">
          <label>Fecha (YYYY-MM-DD):</label>
          <input type="text" id="fechaAudit" placeholder="2026-06-18">
        </div>
      </div>
      <div id="itemsDiv"></div>
    </div>

    <div id="reportes" class="tab">
      <div class="section">
        <h2>Reportes</h2>
        <div class="filters">
          <label>Filtrar por tienda:</label>
          <select id="filtroTienda" onchange="app.actualizarReportes()">
            <option value="">Todas</option>
          </select>
        </div>
        <div style="overflow-x: auto;">
          <table>
            <thead>
              <tr>
                <th>Usuario</th>
                <th>Tienda</th>
                <th>Checklist</th>
                <th>Fecha</th>
                <th>Items Completados</th>
                <th>%</th>
                <th>Observaciones</th>
                <th>Reporte</th>
              </tr>
            </thead>
            <tbody id="reportTable">
              <tr><td colspan="8" class="loading">⏳ Cargando reportes...</td></tr>
            </tbody>
          </table>
        </div>
        <button onclick="app.descargarExcel()" style="margin-top: 20px; width: 100%;">📥 Descargar Excel Detallado</button>
      </div>
    </div>
  </div>
</div>

const app = {
  usuario: null,
  datos: [],
  cargando: false,
  
  init: function() {
    // Cargar logo en el header
    const lh = document.getElementById('logoHeader');
    if(lh) lh.src = LOGO;
    const ll = document.getElementById('logoLogin');
    if(ll) ll.src = LOGO;
    
    const hoy = new Date();
    const fecha = hoy.getFullYear() + '-' + String(hoy.getMonth() + 1).padStart(2, '0') + '-' + String(hoy.getDate()).padStart(2, '0');
    document.getElementById('fechaAudit').value = fecha;
    
    // Recordar el último nombre usado (para no escribirlo completo)
    try {
      const ultimoNombre = localStorage.getItem('ultimoNombre');
      if(ultimoNombre) {
        document.getElementById('usuario').value = ultimoNombre;
      }
    } catch(e) {}
    
    // Llenar autocompletado de nombres
    const dl = document.getElementById('listaUsuarios');
    if(dl) {
      dl.innerHTML = USUARIOS.map(u => '<option value="'+u.nombre+'">').join('');
    }
    
    const usuarioGuardado = sessionStorage.getItem('usuarioLogueado');
    if(usuarioGuardado) {
      try {
        this.usuario = JSON.parse(usuarioGuardado);
        this.mostrarApp();
        this.cargarDatos();
      } catch(e) {}
    }
  },
  
  login: function() {
    const nombre = document.getElementById('usuario').value.toUpperCase().trim();
    const pass = document.getElementById('password').value.trim();
    
    if(!nombre || !pass) { alert('Escribe nombre y contraseña'); return; }
    
    const u = USUARIOS.find(x => x.nombre === nombre && x.pass === pass);
    if(!u) { alert('Usuario o contraseña incorrectos'); return; }
    
    // Guardar el nombre para recordarlo la próxima vez
    try { localStorage.setItem('ultimoNombre', u.nombre); } catch(e) {}
    
    this.usuario = u;
    sessionStorage.setItem('usuarioLogueado', JSON.stringify(u));
    this.mostrarApp();
    this.cargarDatos();
  },
  
  mostrarApp: function() {
    document.getElementById('loginView').style.display = 'none';
    document.getElementById('appView').style.display = 'block';
    document.getElementById('userDisplay').textContent = this.usuario.nombre;
    document.getElementById('tiendaDisplay').textContent = this.usuario.tienda;
    
    if(this.usuario.sup) {
      document.getElementById('rolBadge').innerHTML = '<span class="badge">👨‍💼 SUPERVISOR</span>';
      document.getElementById('tableHeader').innerHTML = '<th>Usuario</th><th>Tienda</th><th>Checklist</th><th>Fecha</th><th>%</th>';
    }
  },
  
  logout: function() {
    sessionStorage.removeItem('usuarioLogueado');
    this.usuario = null;
    this.datos = [];
    document.getElementById('loginView').style.display = 'flex';
    document.getElementById('appView').style.display = 'none';
    document.getElementById('usuario').value = '';
    document.getElementById('password').value = '';
  },
  
  cargarDatos: function() {
    if(this.cargando) return;
    this.cargando = true;
    
    fetch(SHEETS_URL)
      .then(r => r.json())
      .then(datos => {
        this.datos = Array.isArray(datos) ? datos : [];
        this.cargando = false;
        this.actualizarDashboard();
      })
      .catch(e => {
        console.error('Error:', e);
        this.cargando = false;
        this.actualizarDashboard();
      });
  },
  
  actualizarDashboard: function() {
    let datos = this.datos.slice();
    const filtroDash = document.getElementById('filtroTiendaDash')?.value || "";
    
    if(!this.usuario.sup) {
      datos = datos.filter(a => a.usuario === this.usuario.nombre);
    } else if(filtroDash) {
      datos = datos.filter(a => a.tienda === filtroDash);
    }
    
    // Ordenar por fecha: más reciente primero
    const ordenarFecha = (arr) => arr.sort((a, b) => {
      const fa = (a.fecha || '') + '|' + (a.timestamp || '');
      const fb = (b.fecha || '') + '|' + (b.timestamp || '');
      return fb.localeCompare(fa);
    });
    ordenarFecha(datos);
    
    const prom = datos.length > 0 ? Math.round(datos.reduce((s,a) => s+parseInt(a.porcentaje||0), 0)/datos.length) : 0;
    const tiendas = new Set(this.datos.map(a => a.tienda)).size;
    
    document.getElementById('stats').innerHTML = 
      '<div class="stat"><div class="stat-num">'+this.datos.length+'</div><div class="stat-label">Total Auditorías</div></div>' +
      '<div class="stat"><div class="stat-num">'+prom+'%</div><div class="stat-label">Promedio</div></div>' +
      '<div class="stat"><div class="stat-num">'+tiendas+'</div><div class="stat-label">Tiendas</div></div>';
    
    let tabla = '';
    if(this.usuario.sup) {
      tabla = datos.map(a => '<tr><td>'+a.usuario+'</td><td>'+a.tienda+'</td><td>'+a.checklist+'</td><td>'+a.fecha+'</td><td>'+a.porcentaje+'%</td></tr>').join('');
    } else {
      tabla = datos.map(a => '<tr><td>'+a.checklist+'</td><td>'+a.fecha+'</td><td>'+a.porcentaje+'%</td></tr>').join('');
    }
    
    if(!tabla) tabla = '<tr><td colspan="5" class="loading">Sin auditorías</td></tr>';
    document.getElementById('dashTable').innerHTML = tabla;
    
    let tiendas_arr = new Set();
    if(this.usuario.sup) {
      this.datos.forEach(a => tiendas_arr.add(a.tienda));
    } else {
      tiendas_arr.add(this.usuario.tienda);
    }
    
    // Ordenar tiendas alfabéticamente
    const tiendasLista = Array.from(tiendas_arr).sort();
    
    // Llenar el filtro del DASHBOARD (id propio: filtroTiendaDash)
    let html = '<label>Filtrar por tienda:</label><select id="filtroTiendaDash" onchange="app.actualizarDashboard()"><option value="">Todas</option>';
    tiendasLista.forEach(t => { html += '<option value="'+t+'">'+t+'</option>'; });
    html += '</select>';
    document.getElementById('filtersDiv').innerHTML = html;
    
    // Llenar el filtro de REPORTES (conservando la selección actual)
    const selectRep = document.getElementById('filtroTienda');
    if(selectRep) {
      const seleccionActual = selectRep.value;
      let opts = '<option value="">Todas las localidades</option>';
      tiendasLista.forEach(t => {
        const sel = (t === seleccionActual) ? ' selected' : '';
        opts += '<option value="'+t+'"'+sel+'>'+t+'</option>';
      });
      selectRep.innerHTML = opts;
    }
    
    // ACTUALIZAR REPORTES TAMBIÉN
    this.actualizarReportes();
  },
  
  actualizarReportes: function() {
    console.log('Actualizando reportes...', this.datos.length, 'filas');
    const filtro = document.getElementById('filtroTienda')?.value || "";
    let datos = this.datos.slice();
    
    if(!this.usuario.sup) {
      datos = datos.filter(a => a.usuario === this.usuario.nombre);
    } else if(filtro) {
      datos = datos.filter(a => a.tienda === filtro);
    }
    
    // Ordenar por fecha: más reciente primero
    datos.sort((a, b) => {
      const fa = (a.fecha || '') + '|' + (a.timestamp || '');
      const fb = (b.fecha || '') + '|' + (b.timestamp || '');
      return fb.localeCompare(fa);
    });
    
    // Guardar datos filtrados (ya ordenados) para generar reportes PDF
    this.datosFiltrados = datos;
    
    // Agrupar por tienda
    const grupos = {};
    datos.forEach((a, idx) => {
      const t = a.tienda || 'Sin tienda';
      if(!grupos[t]) grupos[t] = [];
      grupos[t].push({ a: a, idx: idx });
    });
    
    // Ordenar nombres de tienda alfabéticamente
    const tiendasOrdenadas = Object.keys(grupos).sort();
    
    let tabla = '';
    tiendasOrdenadas.forEach(tienda => {
      const filas = grupos[tienda];
      // Encabezado de grupo (tienda/CEDI)
      tabla += '<tr style="background:#e8f5e9;"><td colspan="8" style="font-weight:bold;color:#2e7d32;padding:10px 15px;">📍 '+tienda+' ('+filas.length+')</td></tr>';
      
      filas.forEach(f => {
        const a = f.a;
        const idx = f.idx;
        const checklist = CHECKLISTS[a.checklist] || [];
        const itemsCompletos = a.itemsCompletados ? a.itemsCompletados.split(',').filter(x => x).length : 0;
        const obs = (a.obs || '').substring(0, 50);
        tabla += '<tr>' +
          '<td>'+a.usuario+'</td>' +
          '<td>'+a.tienda+'</td>' +
          '<td>'+a.checklist+'</td>' +
          '<td>'+a.fecha+'</td>' +
          '<td>'+itemsCompletos+'/'+checklist.length+'</td>' +
          '<td>'+a.porcentaje+'%</td>' +
          '<td>'+obs+'</td>' +
          '<td><button onclick="app.generarReportePDF('+idx+')" style="padding:6px 12px;font-size:12px;">📄 PDF</button></td>' +
          '</tr>';
      });
    });
    
    if(!tabla) tabla = '<tr><td colspan="8" class="loading">Sin reportes</td></tr>';
    document.getElementById('reportTable').innerHTML = tabla;
  },
  
  generarReportePDF: function(idx) {
    const a = this.datosFiltrados[idx];
    if(!a) { alert('No se encontró la auditoría'); return; }
    
    const checklist = CHECKLISTS[a.checklist] || [];
    const itemsCompletos = a.itemsCompletados ? a.itemsCompletados.split(',').map(x => parseInt(x)) : [];
    
    // Buscar fotos guardadas en el dispositivo para esta auditoría
    let fotos = {};
    try {
      const claveFotos = 'fotos:' + a.usuario + '|' + a.tienda + '|' + a.checklist + '|' + a.fecha;
      const guardadas = localStorage.getItem(claveFotos);
      if(guardadas) fotos = JSON.parse(guardadas);
    } catch(err) {}
    
    const hayFotos = Object.keys(fotos).length > 0;
    
    // Construir filas de items (con columna de foto si aplica)
    let filasItems = '';

      const ok = itemsCompletos.includes(i);
      const estado = ok ? '✔ Cumple' : '✘ No cumple';
      const color = ok ? '#2e7d32' : '#d32f2f';
      const bg = ok ? '#e8f5e9' : '#ffebee';
      filasItems += '<tr>' +
        '<td style="padding:8px 12px;border:1px solid #ccc;">'+(i+1)+'</td>' +
        '<td style="padding:8px 12px;border:1px solid #ccc;">'+item+'</td>' +
        '<td style="padding:8px 12px;border:1px solid #ccc;text-align:center;background:'+bg+';color:'+color+';font-weight:bold;">'+estado+'</td>';
      if(hayFotos) {
        const foto = fotos[i];
        filasItems += '<td style="padding:6px;border:1px solid #ccc;text-align:center;">' +
          (foto ? '<img src="'+foto+'" style="max-width:120px;max-height:90px;border-radius:4px;">' : '<span style="color:#bbb;font-size:11px;">—</span>') +
          '</td>';
      }
      filasItems += '</tr>';
    });
    
    const obsTexto = (a.obs && a.obs.trim()) ? a.obs : 'Sin observaciones';
    
    // Encabezado de tabla (con columna Evidencia si hay fotos)
    const thFoto = hayFotos ? '<th style="width:130px;text-align:center;">Evidencia</th>' : '';
    
    const html = '<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><title>Checklist de Mantenimiento - '+a.checklist+'</title>' +
      '<style>' +
      'body{font-family:"Segoe UI",Arial,sans-serif;margin:0;padding:30px;color:#333;}' +
      '.rep-header{background:#2e7d32;color:white;padding:20px 25px;border-radius:8px 8px 0 0;display:flex;align-items:center;gap:18px;}' +
      '.rep-header img{height:48px;background:white;padding:6px 10px;border-radius:6px;}' +
      '.rep-header h1{margin:0;font-size:22px;}' +
      '.rep-header p{margin:5px 0 0 0;font-size:14px;opacity:0.9;}' +
      '.rep-info{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:20px 25px;background:#f5f5f5;border:1px solid #ddd;border-top:none;}' +
      '.rep-info div{font-size:14px;}' +
      '.rep-info strong{color:#2e7d32;}' +
      '.score-box{text-align:center;padding:15px;margin:20px 25px;background:linear-gradient(135deg,#e8f5e9,#c8e6c9);border-radius:8px;border-left:4px solid #2e7d32;}' +
      '.score-box .num{font-size:36px;font-weight:bold;color:#2e7d32;}' +
      'table{width:calc(100% - 50px);margin:0 25px;border-collapse:collapse;}' +
      'th{background:#2e7d32;color:white;padding:10px 12px;text-align:left;font-size:13px;border:1px solid #2e7d32;}' +
      '.obs-box{margin:20px 25px;padding:15px;background:#fff8e1;border:1px solid #ffe082;border-radius:6px;font-size:14px;}' +
      '.firma{margin:50px 25px 20px;display:grid;grid-template-columns:1fr 1fr;gap:40px;}' +
      '.firma div{border-top:1px solid #333;padding-top:8px;text-align:center;font-size:13px;}' +
      '.footer{margin:30px 25px 0;font-size:11px;color:#999;text-align:center;border-top:1px solid #eee;padding-top:15px;}' +
      '@media print{body{padding:0;} button{display:none !important;}}' +
      '</style></head><body>' +
      '<div class="rep-header"><img src="'+LOGO+'" alt="DISAGRO"><div><h1>Checklist de Mantenimiento</h1><p>'+a.checklist+'</p></div></div>' +
      '<div class="rep-info">' +
      '<div><strong>Auditor:</strong> '+a.usuario+'</div>' +
      '<div><strong>Tienda/Localidad:</strong> '+a.tienda+'</div>' +
      '<div><strong>Checklist:</strong> '+a.checklist+'</div>' +
      '<div><strong>Fecha:</strong> '+a.fecha+'</div>' +
      '</div>' +
      '<div class="score-box"><div class="num">'+a.porcentaje+'%</div><div>Cumplimiento ('+itemsCompletos.length+' de '+checklist.length+' puntos)</div></div>' +
      '<table><thead><tr><th style="width:40px;">#</th><th>Punto Revisado</th><th style="width:130px;text-align:center;">Estado</th>'+thFoto+'</tr></thead><tbody>'+filasItems+'</tbody></table>' +
      '<div class="obs-box"><strong>📝 Observaciones:</strong><br>'+obsTexto+'</div>' +
      '<div class="firma"><div>Firma del Auditor</div><div>Firma del Responsable</div></div>' +
      '<div class="footer">Documento generado el '+new Date().toLocaleString('es-HN')+' · DISAGRO Checklist de Mantenimientos</div>' +
      '<div style="text-align:center;margin:20px;"><button onclick="window.print()" style="padding:12px 25px;background:#2e7d32;color:white;border:none;border-radius:4px;cursor:pointer;font-weight:bold;font-size:14px;">🖨️ Imprimir / Guardar como PDF</button></div>' +
      '</body></html>';
    
    const ventana = window.open('', '_blank');
    ventana.document.write(html);
    ventana.document.close();
  },
  
  cargarChecklist: function() {
    const name = document.getElementById('selectChecklist').value;
    if(!name) { document.getElementById('itemsDiv').innerHTML = ''; return; }
    
    // Reiniciar fotos al cargar un checklist nuevo
    this.fotosActuales = {};
    
    const items = CHECKLISTS[name];
    let html = '<div class="section"><h2>'+name+'</h2><p style="color:#999;">Items: '+items.length+' · La foto es opcional</p>';
    
    items.forEach((item,i) => {
      html += '<div class="item-box">';
      html += '<label class="checkbox-label"><input type="checkbox" id="item'+i+'"> <span>'+item+'</span></label>';
      // Botón de foto + input oculto + miniatura
      html += '<div style="margin-top:8px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;">';
      html += '<input type="file" id="file'+i+'" accept="image/*" capture="environment" style="display:none;" onchange="app.cargarFoto('+i+', this)">';
      html += '<button type="button" onclick="document.getElementById(\'file'+i+'\').click()" style="padding:6px 12px;font-size:12px;background:#607d8b;">📷 Agregar foto</button>';
      html += '<div id="thumb'+i+'"></div>';
      html += '</div>';
      html += '</div>';
    });
    
    html += '<div class="section" style="margin-top:20px;"><label>Observaciones:</label><textarea id="obsFinales" placeholder="Escribe observaciones..."></textarea><button onclick="app.guardarAuditoria()" style="width:100%;margin-top:15px;">✓ GUARDAR AUDITORÍA</button></div>';
    document.getElementById('itemsDiv').innerHTML = html;
  },
  
  cargarFoto: function(i, input) {
    const file = input.files[0];
    if(!file) return;
    
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        // Comprimir: redimensionar a máximo 800px y exportar JPEG
        const maxDim = 800;
        let w = img.width, h = img.height;
        if(w > h && w > maxDim) { h = h * maxDim / w; w = maxDim; }
        else if(h > maxDim) { w = w * maxDim / h; h = maxDim; }
        
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, w, h);
        
        const base64 = canvas.toDataURL('image/jpeg', 0.55);
        this.fotosActuales[i] = base64;
        
        // Mostrar miniatura con opción de quitar
        document.getElementById('thumb'+i).innerHTML = 
          '<div style="display:inline-flex;align-items:center;gap:8px;">' +
          '<img src="'+base64+'" style="height:50px;border-radius:4px;border:1px solid #ccc;">' +
          '<button type="button" onclick="app.quitarFoto('+i+')" style="padding:4px 8px;font-size:11px;background:#d32f2f;">✕ Quitar</button>' +
          '</div>';
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  },
  
  quitarFoto: function(i) {
    delete this.fotosActuales[i];
    document.getElementById('thumb'+i).innerHTML = '';
    document.getElementById('file'+i).value = '';
  },
  
  guardarAuditoria: function() {
    const name = document.getElementById('selectChecklist').value;
    const fecha = document.getElementById('fechaAudit').value;
    const items = CHECKLISTS[name];
    
    if(!name) { alert('❌ Selecciona un checklist'); return; }
    if(!fecha) { alert('❌ Escribe una fecha'); return; }
    
    // Obtener los items completados
    const itemsCompletos = [];
    items.forEach((item, i) => {
      if(document.getElementById('item'+i).checked) {
        itemsCompletos.push(i);
      }
    });
    
    const checked = itemsCompletos.length;
    const pct = Math.round((checked / items.length) * 100);
    
    const data = {
      usuario: this.usuario.nombre,
      tienda: this.usuario.tienda,
      checklist: name,
      fecha: fecha,
      porcentaje: pct,
      itemsCompletados: itemsCompletos.join(','),
      obs: document.getElementById('obsFinales').value
    };
    
    fetch(SHEETS_URL, {
      method: 'POST',
      body: JSON.stringify(data)
    })
    .then(r => r.json())
    .then(res => {
      if(res.success) {
        // Guardar las fotos en el dispositivo, asociadas a esta auditoría
        const fotos = this.fotosActuales || {};
        const numFotos = Object.keys(fotos).length;
        if(numFotos > 0) {
          try {
            const claveFotos = 'fotos:' + this.usuario.nombre + '|' + this.usuario.tienda + '|' + name + '|' + fecha;
            localStorage.setItem(claveFotos, JSON.stringify(fotos));
          } catch(err) {
            alert('⚠️ La auditoría se guardó, pero no se pudieron almacenar las fotos (memoria del dispositivo llena). El reporte se guardó sin fotos.');
          }
        }
        
        alert('✅ AUDITORÍA GUARDADA\n'+name+'\n'+data.fecha+'\n'+pct+'%\nItems: '+checked+'/'+items.length+(numFotos>0?'\nFotos: '+numFotos:''));
        document.getElementById('selectChecklist').value = '';
        document.getElementById('itemsDiv').innerHTML = '';
        this.fotosActuales = {};
        const hoy = new Date();
        const f = hoy.getFullYear() + '-' + String(hoy.getMonth() + 1).padStart(2, '0') + '-' + String(hoy.getDate()).padStart(2, '0');
        document.getElementById('fechaAudit').value = f;
        setTimeout(() => this.cargarDatos(), 1000);
      }
    })
    .catch(e => alert('❌ Error: '+e.message));
  },
  
  showTab: function(tab, event) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(tab).classList.add('active');
    event.target.classList.add('active');
    
    if(tab === 'dashboard' || tab === 'reportes') {
      this.cargarDatos();
    }
  },
  
  descargarExcel: function() {
    const filtro = document.getElementById('filtroTienda')?.value || "";
    let datos = this.datos.slice();
    
    if(!this.usuario.sup) {
      datos = datos.filter(a => a.usuario === this.usuario.nombre);
    } else if(filtro) {
      datos = datos.filter(a => a.tienda === filtro);
    }
    
    // Generar CSV detallado
    let csv = 'REPORTE DETALLADO DE AUDITORÍAS DISAGRO\n';
    csv += 'Generado: ' + new Date().toLocaleString() + '\n\n';
    csv += 'RESUMEN\n';
    csv += 'Usuario,Tienda,Checklist,Fecha,Total Items,Items Completados,Porcentaje,Observaciones\n';
    
    let totalAuditorias = 0;
    let sumaProcentajes = 0;
    
    datos.forEach(a => {
      const checklist = CHECKLISTS[a.checklist] || [];
      const itemsCompletos = a.itemsCompletados ? a.itemsCompletados.split(',').filter(x => x).length : 0;
      const obs = (a.obs || '').replace(/"/g, '""'); // Escapar comillas
      
      csv += '"'+a.usuario+'","'+a.tienda+'","'+a.checklist+'","'+a.fecha+'","'+checklist.length+'","'+itemsCompletos+'","'+a.porcentaje+'%","'+obs+'"\n';
      
      totalAuditorias++;
      sumaProcentajes += parseInt(a.porcentaje || 0);
    });
    
    // Agregar estadísticas finales
    csv += '\n\nESTADÍSTICAS\n';
    csv += 'Total Auditorías,' + totalAuditorias + '\n';
    csv += 'Promedio %,' + (totalAuditorias > 0 ? Math.round(sumaProcentajes / totalAuditorias) : 0) + '%\n';
    
    // Agregar detalle de items por auditoría
    csv += '\n\nDETALLE DE ITEMS COMPLETADOS\n';
    datos.forEach((a, idx) => {
      const checklist = CHECKLISTS[a.checklist] || [];
      const itemsCompletos = a.itemsCompletados ? a.itemsCompletados.split(',').map(x => parseInt(x)) : [];
      
      csv += '\n--- Auditoría #' + (idx + 1) + ' ---\n';
      csv += 'Usuario,' + a.usuario + '\n';
      csv += 'Tienda,' + a.tienda + '\n';
      csv += 'Checklist,' + a.checklist + '\n';
      csv += 'Fecha,' + a.fecha + '\n';
      csv += 'Porcentaje,' + a.porcentaje + '%\n';
      csv += 'Observaciones,' + (a.obs || '') + '\n';
      csv += 'Items Revisados:\n';
      
      checklist.forEach((item, i) => {
        const estado = itemsCompletos.includes(i) ? 'CUMPLE' : 'NO CUMPLE';
        csv += '"'+estado+'","' + item.replace(/"/g, '""') + '"\n';
      });
    });
    
    // BOM UTF-8 para que Excel lea correctamente acentos y símbolos (ñ, í, ✓, etc.)
    const BOM = '\uFEFF';
    const blob = new Blob([BOM + csv], {type:'text/csv;charset=utf-8;'});
    const link = document.createElement('a');
    const url = URL.createObjectURL(blob);
    link.href = url;
    link.download = 'auditoria_detallada_'+this.usuario.nombre.replace(/ /g,'_')+'_'+new Date().toISOString().split('T')[0]+'.csv';
    link.click();
  }
};

app.init();
setInterval(() => { if(app.usuario) app.cargarDatos(); }, 20000);
</script>
